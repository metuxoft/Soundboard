<!DOCTYPE html>
<html lang="en" class="dark-theme">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soundboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E222A">
    <!-- iOS support -->
    <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
    <header class="top-bar">
        <div class="header-content"
            style="display: flex; width: 100%; max-width: 400px; justify-content: space-between; align-items: center;">
            <h1>Soundboard</h1>
            <svg id="theme-toggle" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-sun" style="cursor: pointer; color: var(--text-color);">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" />
                <path d="M12 20v2" />
                <path d="m4.93 4.93 1.41 1.41" />
                <path d="m17.66 17.66 1.41 1.41" />
                <path d="M2 12h2" />
                <path d="M20 12h2" />
                <path d="m6.34 17.66-1.41 1.41" />
                <path d="m19.07 4.93-1.41 1.41" />
            </svg>
        </div>
        <div class="volume-control">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-volume-2 volume-icon">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            </svg>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            <button id="fade-out-btn" class="action-btn" title="Fade volume to 0">Fade Out</button>
            <button id="stop-btn" class="action-btn action-btn--stop" title="Stop all sounds">Stop</button>
        </div>
        <div id="progress-bar"
            style="position: absolute; bottom: 0; left: 0; height: 3px; background-color: var(--button-active); width: 0%; transition: width 0.05s linear;">
        </div>
    </header>

    <main class="soundboard-grid" id="soundboard-grid">
        <!-- Buttons will be generated here by script.js -->
    </main>

    <div class="fab-wrapper">
        <div class="fab-menu" id="fab-menu">
            <button class="fab-item" id="fab-add-files" title="Add Media">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
                    <path d="M14 2v4a2 2 0 0 0 2 2h4" />
                    <path d="M9 15h6" />
                    <path d="M12 18v-6" />
                </svg>
                <span>Add Media</span>
            </button>
            <button class="fab-item" id="fab-remove-media" title="Remove Media">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18" />
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    <line x1="10" x2="10" y1="11" y2="17" />
                    <line x1="14" x2="14" y1="11" y2="17" />
                </svg>
                <span>Remove Media</span>
            </button>
        </div>
        <button class="fab-main" id="fab-main" aria-label="Toggle Media Menu">
            <svg id="fab-icon-music" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-music">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
            </svg>
            <svg id="fab-icon-close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-x">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
            </svg>
        </button>
    </div>

    <!-- Bottom Sheet Menu -->
    <div id="bottom-sheet-backdrop" class="bottom-sheet-backdrop" aria-hidden="true"></div>
    <div id="bottom-sheet" class="bottom-sheet" aria-hidden="true" role="dialog">
        <div class="bottom-sheet-handle-bar">
            <div class="bottom-sheet-handle"></div>
        </div>
        <div class="bottom-sheet-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-music sheet-header-icon">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
            </svg>
            <span id="sheet-sound-name" class="sheet-sound-name">Sound Name</span>
        </div>
        <div class="bottom-sheet-content">
            <div id="sheet-option-loop" class="sheet-option-item" role="button" tabindex="0">
                <div class="option-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-infinity option-icon">
                        <path d="M12 12c-2-2.67-4-4-6-4a4 4 0 1 0 0 8c2 0 4-1.33 6-4Zm0 0c2 2.67 4 4 6 4a4 4 0 1 0 0-8c-2 0-4 1.33-6 4Z"/>
                    </svg>
                    <span class="option-label">Loop sound</span>
                </div>
                <div class="option-right">
                    <label class="toggle-switch">
                        <input type="checkbox" id="sheet-loop-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <div id="sheet-option-delete" class="sheet-option-item danger-option" role="button" tabindex="0">
                <div class="option-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-trash-2 option-icon">
                        <path d="M3 6h18"/>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                        <line x1="10" x2="10" y1="11" y2="17"/>
                        <line x1="14" x2="14" y1="11" y2="17"/>
                    </svg>
                    <span class="option-label">Remove sound</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
